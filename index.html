<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- 🔹 Start Screen -->
  <div id="start-screen" class="card">
    <h1>🧠 Quiz App</h1>
    <p>Test your knowledge and challenge yourself!</p>
    <button class="btn primary" onclick="startQuiz()">Start Quiz</button>
  </div>

  <!-- 🔹 Quiz Screen -->
  <div id="quiz-screen" class="card hidden">
    <p id="progress"></p>
    <h2 id="question"></h2>
    <div id="answers" class="answers"></div>
    <button id="next-btn" class="btn primary">Next</button>
  </div>

  <!-- 🔹 Result Screen -->
  <div id="result-screen" class="card hidden">
    <h2 id="score"></h2>
    <p id="feedback"></p>
    <button class="btn primary" onclick="restartQuiz()">Restart Quiz</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
